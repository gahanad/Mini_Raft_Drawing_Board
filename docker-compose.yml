version: "3.8"

services:
  replica1:
    build: .
    container_name: replica1
    environment:
      - PORT=5001
      - SELF_ID=replica1
      - REPLICAS=http://replica2:5002,http://replica3:5003
    ports:
      - "5001:5001"
    networks:
      - raft-net
    command: node replica1/server.js
    restart: unless-stopped

  replica2:
    build: .
    container_name: replica2
    environment:
      - PORT=5002
      - SELF_ID=replica2
      - REPLICAS=http://replica1:5001,http://replica3:5003
    ports:
      - "5002:5002"
    networks:
      - raft-net
    command: node replica2/server.js
    restart: unless-stopped

  replica3:
    build: .
    container_name: replica3
    environment:
      - PORT=5003
      - SELF_ID=replica3
      - REPLICAS=http://replica1:5001,http://replica2:5002
    ports:
      - "5003:5003"
    networks:
      - raft-net
    command: node replica3/server.js
    restart: unless-stopped

  gateway:
    build: .
    container_name: gateway
    environment:
      - PORT=8080
      - REPLICAS=http://replica1:5001,http://replica2:5002,http://replica3:5003
    ports:
      - "8080:8080"
    networks:
      - raft-net
    depends_on:
      - replica1
      - replica2
      - replica3
    command: node gateway/gateway.js
    restart: unless-stopped

networks:
  raft-net:
    driver: bridge
